
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏐 排球分組工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;padding:16px}
.app{max-width:480px;margin:0 auto}
.title{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:1.5rem}
.section-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.team-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.team-input{flex:1;height:36px;font-size:14px;border:1px solid #e0e0db;border-radius:8px;padding:0 10px;background:#fff;color:#1a1a1a;outline:none}
.team-input:focus{border-color:#999}
.del-btn{width:28px;height:28px;border:none;background:transparent;color:#bbb;cursor:pointer;font-size:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.del-btn:hover{background:#f5f5f0;color:#666}
.player-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.player-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid #e8e8e4;border-radius:10px;background:#fff}
.player-name{flex:1;font-size:14px;color:#1a1a1a}
.player-gender{font-size:12px;padding:2px 8px;border-radius:20px;font-weight:500}
.m-badge{background:#dbeafe;color:#1e40af}
.f-badge{background:#fce7f3;color:#9d174d}
.bind-btn{font-size:12px;padding:3px 10px;border:1px solid #e0e0db;border-radius:20px;background:transparent;color:#888;cursor:pointer;white-space:nowrap}
.bind-btn.active{background:#dcfce7;color:#166534;border-color:#86efac}
.bind-group-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.add-player-row{display:flex;gap:6px;margin-top:4px}
.add-player-row input{flex:1;height:36px;font-size:14px;border:1px solid #e0e0db;border-radius:8px;padding:0 10px;background:#fff;color:#1a1a1a;outline:none}
.add-player-row input:focus{border-color:#999}
.gender-toggle{display:flex;border:1px solid #e0e0db;border-radius:8px;overflow:hidden;height:36px;flex-shrink:0}
.gender-toggle button{flex:1;border:none;padding:0 12px;font-size:13px;cursor:pointer;background:#f5f5f0;color:#888}
.gender-toggle button.sel{background:#dbeafe;color:#1e40af}
.gender-toggle button.sel.f{background:#fce7f3;color:#9d174d}
.mode-tabs{display:flex;border:1px solid #e0e0db;border-radius:8px;overflow:hidden;margin-bottom:1rem}
.mode-tab{flex:1;height:38px;border:none;font-size:13px;cursor:pointer;background:#f5f5f0;color:#888}
.mode-tab.active{background:#1a1a1a;color:#fff}
.btn{height:38px;border:1px solid #e0e0db;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;font-weight:500;padding:0 16px}
.btn:hover{background:#f5f5f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{background:#333}
.btn.full{width:100%}
.action-row{display:flex;gap:8px;margin-top:12px}
.notice{font-size:12px;color:#888;padding:8px 10px;background:#f9f9f7;border-radius:8px;margin-bottom:8px;line-height:1.6}
.divider{height:1px;background:#f0f0ec;margin:10px 0}
.result-team{margin-bottom:10px;padding:10px 14px;border:1px solid #e8e8e4;border-radius:10px;border-left-width:3px}
.result-team-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.result-team-name{font-size:15px;font-weight:600;color:#1a1a1a}
.result-team-count{font-size:12px;color:#888}
.result-players{display:flex;flex-wrap:wrap;gap:6px}
.result-player{font-size:13px;padding:4px 12px;border-radius:20px}
.result-player.m{background:#dbeafe;color:#1e40af}
.result-player.f{background:#fce7f3;color:#9d174d}
.tc0{border-left-color:#3b82f6}
.tc1{border-left-color:#10b981}
.tc2{border-left-color:#f97316}
.tc3{border-left-color:#ec4899}
.tc4{border-left-color:#f59e0b}
.tc5{border-left-color:#8b5cf6}
.player-item.selecting{border:1.5px solid #3b82f6;background:#eff6ff}
.num-assign-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #f0f0ec}
.num-assign-row:last-child{border-bottom:none}
.num-team-badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
.nb0{background:#dbeafe;color:#1e40af}
.nb1{background:#dcfce7;color:#166534}
.nb2{background:#ffedd5;color:#9a3412}
.nb3{background:#fce7f3;color:#9d174d}
.nb4{background:#fef9c3;color:#854d0e}
.nb5{background:#ede9fe;color:#5b21b6}
</style>
</head>
<body>
<div class="app">
  <div class="title">🏐 排球分組工具</div>
  <div class="subtitle">隨機分組 · 綁定夥伴 · 編號分組</div>

  <div class="card">
    <div class="section-label">隊伍設定</div>
    <div id="teams-list"></div>
    <button class="btn full" style="height:34px;font-size:13px;margin-top:4px" onclick="addTeam()">＋ 新增隊伍</button>
  </div>

  <div class="card">
    <div class="section-label">球員名單</div>
    <div class="player-list" id="player-list"></div>
    <div class="divider"></div>
    <div class="add-player-row">
      <input id="new-name" placeholder="輸入名字" onkeydown="if(event.key==='Enter')addPlayer()">
      <div class="gender-toggle">
        <button id="g-m" class="sel" onclick="setGender('m')">男</button>
        <button id="g-f" onclick="setGender('f')">女</button>
      </div>
      <button class="btn" style="flex-shrink:0" onclick="addPlayer()">加入</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">分組方式</div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-random" onclick="setMode('random')">🎲 隨機分組</button>
      <button class="mode-tab" id="tab-number" onclick="setMode('number')">🔢 編號分組</button>
    </div>
    <div id="mode-random-ui">
      <div class="notice">系統會將綁定的玩家安排在同一隊，其餘玩家隨機平均分配到各隊。</div>
    </div>
    <div id="mode-number-ui" style="display:none">
      <div class="notice">球員依序報號 1、2、3...循環，相同號碼的人分為同一隊。</div>
      <div id="num-assign-area"></div>
    </div>
    <button class="btn primary full" onclick="doGroup()" style="margin-top:10px">開始分組</button>
  </div>

  <div class="card" id="result-card" style="display:none">
    <div class="section-label">分組結果</div>
    <div id="result-area"></div>
    <div class="action-row">
      <button class="btn" style="flex:1" onclick="copyResult()">📋 複製結果</button>
      <button class="btn" style="flex:1" onclick="resetResult()">↺ 重新分組</button>
    </div>
  </div>
</div>

<script>
let teams=[{name:'A隊',id:0},{name:'B隊',id:1}];
let players=[];
let nextPid=0;
let currentGender='m';
let mode='random';
let bindGroups=[];
let bindMode=false;
let selectingBindGroup=null;

const groupColors=['#eff6ff','#f0fdf4','#fff7ed','#fdf2f8','#fefce8','#f5f3ff'];
const groupTextColors=['#1e40af','#166534','#9a3412','#9d174d','#854d0e','#5b21b6'];
const groupBorders=['#bfdbfe','#bbf7d0','#fed7aa','#fbcfe8','#fde68a','#ddd6fe'];
const teamColors=['#3b82f6','#10b981','#f97316','#ec4899','#f59e0b','#8b5cf6'];

function renderTeams(){
  const el=document.getElementById('teams-list');
  el.innerHTML=teams.map((t,i)=>`
    <div class="team-row">
      <input class="team-input" value="${t.name}" onchange="teams[${i}].name=this.value;renderAll()" placeholder="隊伍名稱">
      ${teams.length>2?`<button class="del-btn" onclick="removeTeam(${i})">×</button>`:''}
    </div>
  `).join('');
}

function addTeam(){
  const names=['C隊','D隊','E隊','F隊','G隊','H隊'];
  teams.push({name:names[teams.length-2]||`第${teams.length+1}隊`,id:Date.now()});
  renderAll();
}

function removeTeam(i){
  if(teams.length<=2)return;
  teams.splice(i,1);
  renderAll();
}

function setGender(g){
  currentGender=g;
  document.getElementById('g-m').className=g==='m'?'sel':'';
  document.getElementById('g-f').className=g==='f'?'sel f':'';
}

function addPlayer(){
  const inp=document.getElementById('new-name');
  const name=inp.value.trim();
  if(!name)return;
  players.push({id:nextPid++,name,gender:currentGender,bindGroup:null});
  inp.value='';
  inp.focus();
  renderAll();
}

function removePlayer(id){
  players=players.filter(p=>p.id!==id);
  bindGroups=bindGroups.map(g=>g.filter(pid=>pid!==id)).filter(g=>g.length>=1);
  updateBindGroupsOnPlayers();
  renderAll();
}

function getBindGroupIndex(pid){
  return bindGroups.findIndex(g=>g.includes(pid));
}

function toggleBind(pid){
  if(bindMode&&selectingBindGroup!==null){
    const already=getBindGroupIndex(pid);
    if(already===-1){
      bindGroups[selectingBindGroup].push(pid);
    } else if(already===selectingBindGroup){
      bindGroups[selectingBindGroup]=bindGroups[selectingBindGroup].filter(x=>x!==pid);
      if(bindGroups[selectingBindGroup].length<1)bindGroups.splice(selectingBindGroup,1);
    }
    updateBindGroupsOnPlayers();
    renderPlayers();
    return;
  }
  const idx=getBindGroupIndex(pid);
  if(idx===-1){
    const ng=bindGroups.length;
    bindGroups.push([pid]);
    bindMode=true;
    selectingBindGroup=ng;
  } else {
    bindMode=false;
    selectingBindGroup=null;
  }
  updateBindGroupsOnPlayers();
  renderPlayers();
}

function updateBindGroupsOnPlayers(){
  players.forEach(p=>{
    const idx=getBindGroupIndex(p.id);
    p.bindGroup=idx>=0?idx:null;
  });
}

function finishBind(){
  bindMode=false;
  selectingBindGroup=null;
  bindGroups=bindGroups.filter(g=>g.length>=2);
  updateBindGroupsOnPlayers();
  renderPlayers();
}

function renderPlayers(){
  const el=document.getElementById('player-list');
  if(players.length===0){
    el.innerHTML='<div style="font-size:13px;color:#aaa;text-align:center;padding:12px 0">尚未新增球員</div>';
    return;
  }
  el.innerHTML=players.map(p=>{
    const bgIdx=getBindGroupIndex(p.id);
    const isSelecting=bindMode&&bgIdx===selectingBindGroup;
    const bindLabel=bgIdx>=0?`綁定組${bgIdx+1}`:'綁定';
    const bindActive=bgIdx>=0;
    const bgStyle=bgIdx>=0?`background:${groupColors[bgIdx%groupColors.length]};border-color:${groupBorders[bgIdx%groupBorders.length]};`:'';
    return `<div class="player-item${isSelecting?' selecting':''}" style="${bgStyle}">
      <span class="player-gender ${p.gender==='f'?'f-badge':'m-badge'}">${p.gender==='f'?'女':'男'}</span>
      <span class="player-name">${p.name}</span>
      ${bgIdx>=0?`<span class="bind-group-badge" style="background:${groupColors[bgIdx%6]};color:${groupTextColors[bgIdx%6]}">組${bgIdx+1}</span>`:''}
      <button class="bind-btn${bindActive?' active':''}" onclick="toggleBind(${p.id})">${bindLabel}</button>
      <button class="del-btn" onclick="removePlayer(${p.id})">×</button>
    </div>`;
  }).join('');
  if(bindMode){
    el.innerHTML+=`<button class="btn full" style="height:32px;font-size:12px;margin-top:6px" onclick="finishBind()">✓ 完成綁定選擇</button>`;
  }
}

function setMode(m){
  mode=m;
  document.getElementById('tab-random').className='mode-tab'+(m==='random'?' active':'');
  document.getElementById('tab-number').className='mode-tab'+(m==='number'?' active':'');
  document.getElementById('mode-random-ui').style.display=m==='random'?'block':'none';
  document.getElementById('mode-number-ui').style.display=m==='number'?'block':'none';
  if(m==='number')renderNumAssign();
}

function renderNumAssign(){
  const el=document.getElementById('num-assign-area');
  if(players.length===0){el.innerHTML='<div style="font-size:13px;color:#aaa">請先新增球員</div>';return;}
  const n=teams.length;
  el.innerHTML=`<div style="font-size:13px;color:#888;margin-bottom:8px">共 ${n} 隊，依序報號 1～${n}</div>`+
  players.map((p,i)=>`
    <div class="num-assign-row">
      <span class="player-gender ${p.gender==='f'?'f-badge':'m-badge'}">${p.gender==='f'?'女':'男'}</span>
      <span style="flex:1;font-size:14px;color:#1a1a1a">${p.name}</span>
      <span class="num-team-badge nb${(i%n)}">${(i%n)+1}號 → ${teams[i%n]?teams[i%n].name:''}</span>
    </div>
  `).join('');
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function doGroup(){
  if(players.length===0){alert('請先新增球員！');return;}
  if(players.length<teams.length){alert('球員人數不能少於隊伍數！');return;}

  let result=teams.map(t=>({...t,members:[]}));

  if(mode==='random'){
    let remaining=[...players];
    const validBindGroups=bindGroups.filter(g=>g.length>=2);
    for(const grp of validBindGroups){
      const members=grp.map(pid=>players.find(p=>p.id===pid)).filter(Boolean);
      if(!members.length)continue;
      const minTeam=result.reduce((a,b)=>a.members.length<=b.members.length?a:b);
      members.forEach(m=>{
        minTeam.members.push(m);
        remaining=remaining.filter(p=>p.id!==m.id);
      });
    }
    shuffle(remaining).forEach(p=>{
      result.reduce((a,b)=>a.members.length<=b.members.length?a:b).members.push(p);
    });
  } else {
    players.forEach((p,i)=>{result[i%teams.length].members.push(p);});
  }

  renderResult(result);
}

function renderResult(result){
  const el=document.getElementById('result-area');
  el.innerHTML=result.map((t,i)=>`
    <div class="result-team tc${i%6}" style="border-left-color:${teamColors[i%6]}">
      <div class="result-team-header">
        <span class="result-team-name">${t.name}</span>
        <span class="result-team-count">${t.members.length} 人（男 ${t.members.filter(p=>p.gender!=='f').length}、女 ${t.members.filter(p=>p.gender==='f').length}）</span>
      </div>
      <div class="result-players">
        ${t.members.map(p=>`<span class="result-player ${p.gender==='f'?'f':'m'}">${p.name}</span>`).join('')}
      </div>
    </div>
  `).join('');
  document.getElementById('result-card').style.display='block';
  document.getElementById('result-card').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function copyResult(){
  const lines=['🏐 排球分組結果\n'];
  const cards=document.querySelectorAll('.result-team');
  cards.forEach(c=>{
    const name=c.querySelector('.result-team-name').textContent;
    const count=c.querySelector('.result-team-count').textContent;
    const players=[...c.querySelectorAll('.result-player')].map(p=>p.textContent).join('、');
    lines.push(`【${name}】${count}\n${players}`);
  });
  navigator.clipboard.writeText(lines.join('\n\n')).then(()=>{
    alert('✅ 已複製！可直接貼到 LINE 群組');
  }).catch(()=>{
    alert('複製失敗，請手動複製');
  });
}

function resetResult(){
  document.getElementById('result-card').style.display='none';
}

function renderAll(){
  renderTeams();
  renderPlayers();
  if(mode==='number')renderNumAssign();
}

renderAll();
</script>
</body>
</html>
