<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>排球報名系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#181b24;--bg3:#1e2230;--border:#2a2f3f;
  --text:#f0f2f8;--text2:#8b91a8;--text3:#4a506a;
  --accent:#4f8fff;--accent2:#3a6fd4;
  --male:#4f8fff;--male-bg:#1a2545;--male-border:#2d4a8a;
  --female:#ff6b9d;--female-bg:#2a1428;--female-border:#6b2245;
  --green:#3ed98a;--green-bg:#0d2a1e;--green-border:#1a5a3a;
  --yellow:#fbbf24;--red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:20px 16px 0;text-align:center}
.header-logo{font-size:32px;margin-bottom:4px}
.header-title{font-size:20px;font-weight:700;letter-spacing:.02em}
.header-sub{font-size:12px;color:var(--text2);margin-top:2px}
.tab-nav{display:flex;margin:16px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg2)}
.tab-btn{flex:1;height:40px;border:none;background:transparent;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;transition:.2s}
.tab-btn.active{background:var(--accent);color:#fff}
.page{display:none;padding:0 16px 24px}.page.active{display:block}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.date-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.date-scroll::-webkit-scrollbar{display:none}
.date-chip{flex-shrink:0;padding:8px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);cursor:pointer;text-align:center;transition:.2s;min-width:68px}
.date-chip.active{border-color:var(--accent);background:rgba(79,143,255,.15)}
.date-chip .month,.date-chip .weekday{font-size:10px;color:var(--text2)}
.date-chip .day{font-size:18px;font-weight:700;color:var(--text)}
.date-chip.active .day{color:var(--accent)}
.stats-bar{display:flex;gap:8px;margin-bottom:12px}
.stat-box{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:700}.stat-num.male{color:var(--male)}.stat-num.female{color:var(--female)}.stat-num.total{color:var(--green)}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px}
.preset-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.preset-btn{padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;transition:.15s;text-align:center;position:relative;line-height:1.3;min-height:38px}
.preset-btn.male-btn{border-color:var(--male-border)}.preset-btn.female-btn{border-color:var(--female-border)}
.preset-btn.signed{background:var(--male-bg);border-color:var(--male);color:var(--male)}
.preset-btn.signed.female-btn{background:var(--female-bg);border-color:var(--female);color:var(--female)}
.preset-btn .check{display:none;position:absolute;top:4px;right:6px;font-size:10px}.preset-btn.signed .check{display:block}
.preset-tools{display:flex;gap:6px;margin-bottom:8px}
.mini-btn{flex:1;min-height:32px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;font-weight:500}
.mini-btn:hover{border-color:var(--accent);color:var(--accent)}
.mini-btn.active{background:rgba(79,143,255,.15);border-color:var(--accent);color:var(--accent)}
.add-row{display:flex;gap:6px;margin-top:8px}
.add-row input{flex:1;min-width:0;height:38px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;padding:0 12px;outline:none}
.add-row input:focus,.team-input:focus{border-color:var(--accent)}.add-row input::placeholder{color:var(--text3)}
.gender-toggle{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0}
.gender-toggle button{width:38px;height:38px;border:none;background:var(--bg3);color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer}
.gender-toggle button.sel-m{background:var(--male-bg);color:var(--male)}.gender-toggle button.sel-f{background:var(--female-bg);color:var(--female)}
.add-btn{width:38px;height:38px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text2);font-size:20px;cursor:pointer;flex-shrink:0;line-height:1}
.add-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.roster-list{display:flex;flex-direction:column;gap:5px}
.roster-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px}
.roster-item .badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;flex-shrink:0}
.badge-m{background:var(--male-bg);color:var(--male);border:1px solid var(--male-border)}
.badge-f{background:var(--female-bg);color:var(--female);border:1px solid var(--female-border)}
.roster-name{flex:1;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bind-btn{font-size:11px;padding:3px 9px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.bind-btn.bound{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.bind-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0}
.roster-del{width:24px;height:24px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:16px;border-radius:50%;flex-shrink:0}
.roster-del:hover{color:var(--red);background:rgba(248,113,113,.1)}
.empty-hint{font-size:13px;color:var(--text3);text-align:center;padding:16px 0}
.tool-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.tool-row .act-btn{height:34px;font-size:12px}
.team-setup{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}.team-row{display:flex;align-items:center;gap:8px}
.team-input{flex:1;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;padding:0 12px;outline:none;min-width:0}
.mode-tabs{display:flex;gap:6px;margin-bottom:12px}
.mode-tab{flex:1;height:38px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;font-weight:500}
.mode-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.notice{font-size:12px;color:var(--text2);padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:10px;line-height:1.6;border:1px solid var(--border)}
.warn{color:var(--yellow);border-color:#6a4a0a;background:#241c0a}
.num-tier{border:1px solid var(--border);border-radius:10px;background:var(--bg3);padding:8px;margin-bottom:8px}
.num-tier-title{font-size:12px;color:var(--text2);margin-bottom:6px}
.strength-rank{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text2);font-size:11px;flex-shrink:0}
.drag-handle{width:28px;height:28px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text3);display:inline-flex;align-items:center;justify-content:center;font-size:16px;line-height:1;cursor:grab;flex-shrink:0}
.num-row{cursor:grab;touch-action:none}
.num-row.dragging{opacity:.45;border-color:var(--accent);background:rgba(79,143,255,.12)}
.num-row.drag-over{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.num-row.touch-dragging{opacity:.55;transform:scale(.99)}
.tier-hint{font-size:11px;color:var(--text3);margin-left:auto}
.go-btn{width:100%;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;font-size:15px;font-family:inherit;font-weight:700;cursor:pointer;letter-spacing:.05em}
.go-btn:hover{opacity:.9}.go-btn:active{opacity:.75}
.result-team{margin-bottom:10px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:var(--bg3);border-left-width:3px}
.result-team-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}.result-team-name{font-size:15px;font-weight:700}.result-team-count{font-size:12px;color:var(--text2)}
.result-players{display:flex;flex-wrap:wrap;gap:5px}.rp{font-size:13px;padding:4px 12px;border-radius:20px}
.rp.m{background:var(--male-bg);color:var(--male);border:1px solid var(--male-border)}.rp.f{background:var(--female-bg);color:var(--female);border:1px solid var(--female-border)}
.action-row{display:flex;gap:8px;margin-top:10px}.act-btn{flex:1;height:38px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;font-weight:500}
.act-btn:hover{border-color:var(--accent);color:var(--accent)}
.num-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}.num-row:last-child{border-bottom:none}
.tc0{border-left-color:#4f8fff}.tc1{border-left-color:#3ed98a}.tc2{border-left-color:#f97316}.tc3{border-left-color:#ff6b9d}.tc4{border-left-color:#fbbf24}.tc5{border-left-color:#a78bfa}
.tnc0{color:#4f8fff}.tnc1{color:#3ed98a}.tnc2{color:#f97316}.tnc3{color:#ff6b9d}.tnc4{color:#fbbf24}.tnc5{color:#a78bfa}
.bind-select-bar{padding:8px 10px;background:rgba(79,143,255,.15);border:1px solid var(--accent);border-radius:10px;font-size:12px;color:var(--accent);text-align:center;margin-top:8px;cursor:pointer}
.roster-item.selecting{border:1.5px solid var(--accent)!important}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}.shake{animation:shake .35s ease}
@keyframes pop{0%{transform:scale(.92)}50%{transform:scale(1.06)}100%{transform:scale(1)}}.pop{animation:pop .2s ease}
.unbind-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:.15s;opacity:.7}.unbind-btn:hover{opacity:1;background:rgba(255,80,80,.15);border-color:#f87171;color:#f87171}
.pay-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;transition:.2s}
.pay-item.paid{background:var(--green-bg);border-color:var(--green-border)}
.pay-toggle{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--bg);color:var(--text3);font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;line-height:1}
.pay-item.paid .pay-toggle{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.pay-name{flex:1;font-size:14px}
.pay-status{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0}
.pay-item.paid .pay-status{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.pay-item:not(.paid) .pay-status{background:var(--bg);color:var(--text3);border:1px solid var(--border)}
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">🏐</div>
  <div class="header-title">排球報名系統</div>
  <div class="header-sub" id="header-sub">每週六活動</div>
</div>
 
<div class="tab-nav">
  <button class="tab-btn active" onclick="showPage('signup', this)">📋 報名</button>
  <button class="tab-btn" onclick="showPage('group', this)">🎲 分組</button>
  <button class="tab-btn" onclick="showPage('payment', this)">💰 收錢</button>
</div>
 
<div class="page active" id="page-signup">
  <div class="section">
    <div class="section-title">選擇活動日期</div>
    <div class="date-scroll" id="date-scroll"></div>
  </div>
 
  <div class="stats-bar">
    <div class="stat-box"><div class="stat-num male" id="s-male">0</div><div class="stat-label">男生</div></div>
    <div class="stat-box"><div class="stat-num total" id="s-total">0</div><div class="stat-label">總人數</div></div>
    <div class="stat-box"><div class="stat-num female" id="s-female">0</div><div class="stat-label">女生</div></div>
  </div>
 
  <div class="section">
    <div class="section-title">👨 男生（點擊報名）</div>
    <div class="preset-tools">
      <button class="mini-btn" id="male-toggle" onclick="togglePresetGroup('m')">男生全選</button>
      <button class="mini-btn" onclick="clearPresetGroup('m')">清除男生</button>
    </div>
    <div class="preset-grid" id="male-presets"></div>
  </div>
 
  <div class="section">
    <div class="section-title">👩 女生（點擊報名）</div>
    <div class="preset-tools">
      <button class="mini-btn" id="female-toggle" onclick="togglePresetGroup('f')">女生全選</button>
      <button class="mini-btn" onclick="clearPresetGroup('f')">清除女生</button>
    </div>
    <div class="preset-grid" id="female-presets"></div>
  </div>
 
  <div class="section">
    <div class="section-title">➕ 新增臨時球員</div>
    <div class="add-row">
      <input id="new-name" placeholder="輸入名字" onkeydown="if(event.key==='Enter')addCustom()">
      <div class="gender-toggle">
        <button id="cg-m" class="sel-m" onclick="setCGender('m')">男</button>
        <button id="cg-f" onclick="setCGender('f')">女</button>
      </div>
      <button class="add-btn" onclick="addCustom()">+</button>
    </div>
  </div>
 
  <div class="section">
    <div class="section-title">📋 本次名單</div>
    <div id="roster"></div>
    <div class="tool-row">
      <button class="act-btn" id="all-preset-toggle" onclick="toggleAllPresets()">全選常用</button>
      <button class="act-btn" onclick="copyLastWeek()">複製上週名單</button>
      <button class="act-btn" onclick="clearToday()">清空本日名單</button>
    </div>
  </div>
 
  <div style="text-align:center;margin-top:4px">
    <button class="go-btn" style="max-width:300px" onclick="goToGroup()">前往分組 →</button>
  </div>
</div>
 
<div class="page" id="page-group">
  <div class="section">
    <div class="section-title">隊伍設定</div>
    <div class="team-setup" id="teams-list"></div>
    <button class="act-btn" style="width:100%;height:34px;font-size:12px;margin-top:4px" onclick="addTeam()">＋ 新增隊伍</button>
  </div>
 
  <div class="section" id="roster-summary">
    <div class="section-title">本次名單</div>
    <div id="group-roster-list"></div>
  </div>
 
  <div class="section">
    <div class="section-title">分組方式</div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-random" onclick="setMode('random')">🎲 隨機分組</button>
      <button class="mode-tab" id="tab-number" onclick="setMode('number')">⚖️ 實力分組</button>
    </div>
    <div id="mode-random-ui">
      <div class="notice">綁定的玩家會被安排在同一隊，其餘玩家會盡量平均人數與男女比例。</div>
      <div class="notice warn" id="bind-warning" style="display:none"></div>
    </div>
    <div id="mode-number-ui" style="display:none">
      <div class="notice">由使用者判斷實力，拖曳球員由強到弱排序；同一層球員不會分到同隊，綁定球員會優先同隊，但同一層球員不能互相綁定。</div>
      <div id="num-preview"></div>
    </div>
    <button class="go-btn" onclick="doGroup()">開始分組 🎲</button>
  </div>
 
  <div class="section" id="result-card" style="display:none">
    <div class="section-title">分組結果</div>
    <div id="result-area"></div>
    <div class="action-row">
      <button class="act-btn" onclick="doGroup()">↺ 再分一次</button>
      <button class="act-btn" onclick="confirmGroupResult()">✓ 確定分組</button>
    </div>
  </div>

  <div class="section" id="confirmed-card" style="display:none">
    <div class="section-title">確定分組紀錄</div>
    <div id="confirmed-area"></div>
  </div>
</div>
 
<div class="page" id="page-payment">
  <div class="section">
    <div class="section-title">選擇活動日期</div>
    <div class="date-scroll" id="pay-date-scroll"></div>
  </div>
 
  <div class="stats-bar">
    <div class="stat-box"><div class="stat-num total" id="pay-total">0</div><div class="stat-label">總人數</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--green)" id="pay-paid">0</div><div class="stat-label">已收錢</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--yellow)" id="pay-unpaid">0</div><div class="stat-label">未收錢</div></div>
  </div>
 
  <div class="section">
    <div class="section-title">💰 收費名單</div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <button class="mini-btn" onclick="payAll()">全部已收</button>
      <button class="mini-btn" onclick="payNone()">全部未收</button>
    </div>
    <div id="pay-list"><div class="empty-hint">請先到報名頁新增球員</div></div>
  </div>
 
  <div class="section">
    <div class="section-title">💵 費用設定</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:13px;color:var(--text2)">每人費用</span>
      <div style="display:flex;align-items:center;gap:6px">
        <input id="pay-fee" type="number" min="0" step="10" value="150"
          style="width:90px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;padding:0 10px;outline:none;text-align:center"
          oninput="savePayFee()" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
        <span style="font-size:13px;color:var(--text2)">元</span>
      </div>
      <span style="font-size:13px;color:var(--green);margin-left:auto">已收合計：$<span id="pay-sum">0</span></span>
    </div>
  </div>
</div>
 
<script>
const MALE_PRESETS = ['🐟','哲諒','ㄚ堂','家豪','ㄚ賢','JJ','宣邑','大寬'];
const FEMALE_PRESETS = ['🐑','沈','雅瑄','小寬','珮婷'];
const STORAGE_KEY = 'volleyball-signup-v2';
const CLOUD_SYNC = location.protocol === 'https:' || location.hostname.endsWith('.pages.dev');
const G_COLORS = [
  {bg:'#1a2d4a',text:'#4f8fff',border:'#2d4a7a'},
  {bg:'#0d2a1e',text:'#3ed98a',border:'#1a5a3a'},
  {bg:'#2a1a0a',text:'#f97316',border:'#6a3a0a'},
  {bg:'#2a0a1a',text:'#ff6b9d',border:'#6a1a3a'},
  {bg:'#2a200a',text:'#fbbf24',border:'#6a4a0a'},
  {bg:'#1a1030',text:'#a78bfa',border:'#3a1a6a'}
];
 
let state = loadState();
let teams = state.teams;
let selectedDate = state.selectedDate || '';
let players = [];
let nextId = 0;
let customGender = 'm';
let mode = 'random';
let bindGroups = [];
let bindMode = false;
let selectingBG = null;
let cloudSaveTimer = null;
 
function escapeHTML(value){
  return String(value).replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}
 
function loadState(){
  const fallback = {version:3,selectedDate:'',teams:[{name:'A隊'},{name:'B隊'},{name:'C隊'}],rosters:{},payments:{},payFee:150};
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return fallback;
    const saved = JSON.parse(raw);
    return {
      version:3,
      selectedDate:saved.selectedDate || '',
      teams:Array.isArray(saved.teams) && saved.teams.length >= 3 ? saved.teams : fallback.teams,
      rosters:saved.rosters && typeof saved.rosters === 'object' ? saved.rosters : {},
      payments:saved.payments && typeof saved.payments === 'object' ? saved.payments : {},
      payFee:Number.isFinite(saved.payFee) ? saved.payFee : 150
    };
  }catch(_){
    return fallback;
  }
}
 
function saveState(options = {}){
  state.selectedDate = selectedDate;
  state.teams = teams;
  const prev = state.rosters[selectedDate] || {};
  state.rosters[selectedDate] = {
    ...prev,
    players,
    bindGroups,
    nextId,
    teams: teams.map(t=>({...t}))
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if(options.cloud !== false) queueCloudSave();
}
 
function loadRosterForDate(dateKey){
  const roster = state.rosters[dateKey] || {players:[],bindGroups:[],nextId:0};
  if(Array.isArray(roster.teams) && roster.teams.length >= 2) teams = roster.teams;
  else teams = state.teams;
  players = Array.isArray(roster.players) ? roster.players : [];
  bindGroups = Array.isArray(roster.bindGroups) ? roster.bindGroups : [];
  nextId = Number.isFinite(roster.nextId) ? roster.nextId : players.reduce((m,p)=>Math.max(m,p.id || 0),-1)+1;
  bindMode = false;
  selectingBG = null;
  updateBindOnPlayers();
}
 
function currentRosterPayload(){
  const roster = state.rosters[selectedDate] || {};
  return {
    players,
    bindGroups,
    nextId,
    teams: teams.map(t=>({...t})),
    payments: getPayments(selectedDate),
    groupResult: roster.groupResult || null,
    confirmedGroups: Array.isArray(roster.confirmedGroups) ? roster.confirmedGroups : []
  };
}
 
async function loadRosterFromCloud(dateKey){
  if(!CLOUD_SYNC) return false;
  try{
    const res = await fetch(`/api/roster?date=${encodeURIComponent(dateKey)}`, {cache:'no-store'});
    if(!res.ok) return false;
    const roster = await res.json();
    if(!Array.isArray(roster.players)) return false;
    state.rosters[dateKey] = {
      players: roster.players,
      bindGroups: Array.isArray(roster.bindGroups) ? roster.bindGroups : [],
      nextId: Number.isFinite(roster.nextId) ? roster.nextId : 0,
      teams: Array.isArray(roster.teams) ? roster.teams : state.teams,
      groupResult: Array.isArray(roster.groupResult) ? roster.groupResult : null,
      confirmedGroups: Array.isArray(roster.confirmedGroups) ? roster.confirmedGroups : []
    };
    // load payments if synced
    if(roster.payments && typeof roster.payments === 'object'){
      if(!state.payments) state.payments = {};
      state.payments[dateKey] = roster.payments;
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    return true;
  }catch(_){
    return false;
  }
}
 
function queueCloudSave(){
  if(!CLOUD_SYNC || !selectedDate) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(saveRosterToCloud, 350);
}
 
async function saveRosterToCloud(){
  if(!CLOUD_SYNC || !selectedDate) return;
  try{
    await fetch(`/api/roster?date=${encodeURIComponent(selectedDate)}`, {
      method:'PUT',
      headers:{'content-type':'application/json'},
      body:JSON.stringify(currentRosterPayload())
    });
  }catch(_){}
}
 
function getNextSaturdays(n=8){
  const dates = [];
  const start = new Date();
  start.setHours(0,0,0,0);
  const toSat = start.getDay() === 6 ? 0 : (6 - start.getDay() + 7) % 7;
  start.setDate(start.getDate() + toSat);
  for(let i=0;i<n;i++){
    const d = new Date(start);
    d.setDate(start.getDate() + i * 7);
    dates.push(d);
  }
  return dates;
}
 
function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtDisplay(key){
  const [y,m,d] = key.split('-').map(Number);
  return `${m}/${d}`;
}
function fmtLabel(d){
  const m = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  return {month:m[d.getMonth()],day:d.getDate(),weekday:'週六'};
}
 
function renderDates(){
  const dates = getNextSaturdays(8);
  if(!selectedDate) selectedDate = fmt(dates[0]);
  if(!state.rosters[selectedDate]) state.rosters[selectedDate] = {players:[],bindGroups:[],nextId:0};
  const el = document.getElementById('date-scroll');
  el.innerHTML = dates.map(d=>{
    const key = fmt(d);
    const {month,day,weekday} = fmtLabel(d);
    return `<button class="date-chip${key===selectedDate?' active':''}" onclick="selectDate('${key}')">
      <div class="month">${month}</div>
      <div class="day">${day}</div>
      <div class="weekday">${weekday}</div>
    </button>`;
  }).join('');
  document.getElementById('header-sub').textContent = `${selectedDate} 每週六活動`;
}
 
async function selectDate(key){
  saveState({cloud:false});
  selectedDate = key;
  loadRosterForDate(selectedDate);
  if(await loadRosterFromCloud(selectedDate)) loadRosterForDate(selectedDate);
  renderAll();
}
 
function togglePreset(name, gender){
  const exists = players.find(p=>p.name===name && p.preset);
  if(exists){
    players = players.filter(p=>!(p.name===name && p.preset));
    bindGroups = bindGroups.map(g=>g.filter(id=>id!==exists.id)).filter(g=>g.length>0);
    updateBindOnPlayers();
  }else{
    players.push({id:nextId++,name,gender,preset:true,bindGroup:null});
  }
  saveState();
  renderAll();
}
 
function presetNamesByGender(gender){
  return gender === 'f' ? FEMALE_PRESETS : MALE_PRESETS;
}
 
function removePresetNames(names){
  const ids = players.filter(p=>p.preset && names.includes(p.name)).map(p=>p.id);
  players = players.filter(p=>!(p.preset && names.includes(p.name)));
  bindGroups = bindGroups.map(g=>g.filter(id=>!ids.includes(id))).filter(g=>g.length>0);
  updateBindOnPlayers();
}
 
function addMissingPresets(names, gender){
  names.forEach(name=>{
    if(!players.find(p=>p.name===name)){
      players.push({id:nextId++,name,gender,preset:true,bindGroup:null});
    }
  });
}
 
function togglePresetGroup(gender){
  const names = presetNamesByGender(gender);
  const allSigned = names.every(name=>players.find(p=>p.name===name && p.preset));
  if(allSigned){
    removePresetNames(names);
  }else{
    addMissingPresets(names, gender);
  }
  saveState();
  renderAll();
}
 
function clearPresetGroup(gender){
  removePresetNames(presetNamesByGender(gender));
  saveState();
  renderAll();
}
 
function toggleAllPresets(){
  const allNames = [...MALE_PRESETS, ...FEMALE_PRESETS];
  const allSigned = allNames.every(name=>players.find(p=>p.name===name && p.preset));
  if(allSigned){
    removePresetNames(allNames);
  }else{
    addMissingPresets(MALE_PRESETS, 'm');
    addMissingPresets(FEMALE_PRESETS, 'f');
  }
  saveState();
  renderAll();
}

function removePlayer(id){

function setCGender(g){

  document.getElementById('cg-m').className = g==='m' ? 'sel-m' : '';
  document.getElementById('cg-f').className = g==='f' ? 'sel-f' : '';

function getBGIdx(id){return bindGroups.findIndex(g=>g.includes(id));}
 
// 取得某 player 在分組結果中所在的隊伍名稱（若無結果則回傳 null）
function getGroupTeamOf(id){
  const gr = (state.rosters[selectedDate] || {}).groupResult;
  if(!gr) return null;
  for(const t of gr){
    if(t.members.some(m=>m.id===id)) return t.name;
  }
  return null;
}

function getStrengthTierIndex(id){
  const idx = players.findIndex(p=>p.id===id);
  return idx >= 0 ? Math.floor(idx / teams.length) : -1;
}

function hasSameTierInGroup(ids){
  const seen = new Set();
  for(const id of ids){
    const tier = getStrengthTierIndex(id);
    if(tier < 0) continue;
    if(seen.has(tier)) return true;
    seen.add(tier);
  }
  return false;
}

function showBindRuleWarning(message){
  const tip = document.getElementById('bind-warning');
  if(tip){
    tip.style.display = 'block';
    tip.textContent = message;
    setTimeout(()=>renderBindWarning(),2500);
  }else{
    alert(message.replace(/^⚠️\s*/, ''));
  }
}
 
function toggleBind(id){
  if(bindMode && selectingBG !== null){
    const already = getBGIdx(id);
    if(already === -1){
      const nextGroup = [...bindGroups[selectingBG], id];
      if(hasSameTierInGroup(nextGroup)){
        document.querySelectorAll('.roster-item.selecting, [data-id="'+id+'"]').forEach(el=>el.classList.add('shake'));
        setTimeout(()=>document.querySelectorAll('.shake').forEach(el=>el.classList.remove('shake')),400);
        showBindRuleWarning('⚠️ 同一實力層的球員不能互綁，否則同層會被分到同一隊');
        return;
      }
      // 檢查：若有分組結果，兩人必須在不同隊
      const firstId = bindGroups[selectingBG][0];
      if(firstId !== undefined){
        const myTeam = getGroupTeamOf(id);
        const firstTeam = getGroupTeamOf(firstId);
        if(myTeam && firstTeam && myTeam === firstTeam){
          // 視覺提示 shake
          document.querySelectorAll('.roster-item.selecting, [data-id="'+id+'"]').forEach(el=>el.classList.add('shake'));
          setTimeout(()=>document.querySelectorAll('.shake').forEach(el=>el.classList.remove('shake')),400);
          showBindRuleWarning(`⚠️ 「${players.find(p=>p.id===id)?.name||''}」與綁定組成員同隊（${myTeam}），不能互綁`);
          return;
        }
      }
      bindGroups[selectingBG].push(id);
    }else if(already === selectingBG){
      bindGroups[selectingBG] = bindGroups[selectingBG].filter(x=>x!==id);
      if(bindGroups[selectingBG].length < 1) bindGroups.splice(selectingBG,1);
    }
    updateBindOnPlayers();
    saveState();
    renderRoster();
    renderGroupRoster();
    return;
  }
  const idx = getBGIdx(id);
  if(idx === -1){
    selectingBG = bindGroups.length;
    bindGroups.push([id]);
    bindMode = true;
  }else{
    bindMode = false;
    selectingBG = null;
  }
  updateBindOnPlayers();
  saveState();
  renderRoster();
  renderGroupRoster();
}
 
function finishBind(){
  bindMode = false;
  selectingBG = null;
  bindGroups = bindGroups.filter(g=>g.length>=2);
  updateBindOnPlayers();
  saveState();
  renderRoster();
  renderGroupRoster();
}
 
// 將某人移出綁定組（若組剩不足2人則整組解散）
function unbindPlayer(id){
  const idx = getBGIdx(id);
  if(idx < 0) return;
  bindGroups[idx] = bindGroups[idx].filter(x=>x!==id);
  if(bindGroups[idx].length < 2) bindGroups.splice(idx, 1);
  // 若正在選取此組，結束選取模式
  if(bindMode && selectingBG === idx){ bindMode=false; selectingBG=null; }
  else if(bindMode && selectingBG > idx){ selectingBG--; } // 修正 index 位移
  updateBindOnPlayers();
  saveState();
  renderRoster();
  renderGroupRoster();
}
 
function updateBindOnPlayers(){
  players.forEach(p=>{
    const i = getBGIdx(p.id);
    p.bindGroup = i >= 0 ? i : null;
  });
}

function playerRow(p, canDelete){
  const bgIdx = getBGIdx(p.id);

  const gc = bgIdx >= 0 ? G_COLORS[bgIdx % G_COLORS.length] : null;

  const bindClass = `bind-btn${bgIdx>=0?' bound':''}`;

    ? `<button class="unbind-btn" title="移出綁定組" onclick="unbindPlayer(${p.id})">✕</button>`
    : '';
 
  return `<div class="roster-item${isSelecting?' selecting':''}" style="${bgStyle}">

    <span class="roster-name">${escapeHTML(p.name)}</span>
    ${bgIdx>=0?`<span class="bind-badge" style="background:${gc.bg};color:${gc.text};border:1px solid ${gc.border}">組${bgIdx+1}</span>`:''}
    <button class="${bindClass}" onclick="toggleBind(${p.id})">${bindLabel}</button>
    ${unbindBtn}
    ${canDelete?`<button class="roster-del" onclick="removePlayer(${p.id})">×</button>`:''}
  </div>`;
}

let dragStrengthIndex = null;
let touchDrag = null;
 
function moveStrengthTo(from, to){
  if(from === to || from < 0 || to < 0 || from >= players.length || to >= players.length) return;
  // 純交換，不做插入位移
  [players[from], players[to]] = [players[to], players[from]];
  saveState();
  renderRoster();
  renderGroupRoster();
  renderNumPreview();
}
 
function startStrengthDrag(event, index){
  dragStrengthIndex = index;
  event.currentTarget.classList.add('dragging');
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', String(index));
}
 
function overStrengthDrag(event){
  event.preventDefault();
  event.currentTarget.classList.add('drag-over');
}
 
function leaveStrengthDrag(event){
  event.currentTarget.classList.remove('drag-over');
}
 
function dropStrength(event, index){
  event.preventDefault();
  event.currentTarget.classList.remove('drag-over');
  const from = dragStrengthIndex ?? Number(event.dataTransfer.getData('text/plain'));
  dragStrengthIndex = null;
  moveStrengthTo(from, index);
}
 
function endStrengthDrag(event){
  dragStrengthIndex = null;
  event.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.num-row.drag-over').forEach(el=>el.classList.remove('drag-over'));
}
 
function startStrengthPointer(event, index){
  if(event.pointerType !== 'touch') return;
  touchDrag = {from:index,to:index,row:event.currentTarget,startY:event.clientY};
  event.currentTarget.setPointerCapture(event.pointerId);
}
 
function moveStrengthPointer(event){
  if(!touchDrag || event.pointerType !== 'touch') return;
  if(Math.abs(event.clientY - touchDrag.startY) > 8) touchDrag.row.classList.add('touch-dragging');
  const target = document.elementsFromPoint(event.clientX, event.clientY)
    .find(el=>el.classList && el.classList.contains('num-row') && el.dataset.strengthIndex);
  if(!target) return;
  document.querySelectorAll('.num-row.drag-over').forEach(el=>el.classList.remove('drag-over'));
  target.classList.add('drag-over');
  touchDrag.to = Number(target.dataset.strengthIndex);
}
 
function endStrengthPointer(event){
  if(!touchDrag || event.pointerType !== 'touch') return;
  const {from,to,row} = touchDrag;
  touchDrag = null;
  row.classList.remove('touch-dragging');
  document.querySelectorAll('.num-row.drag-over').forEach(el=>el.classList.remove('drag-over'));
  moveStrengthTo(from, to);
}
 
function renderNumPreview(){
  const el = document.getElementById('num-preview');
  if(!el || players.length === 0){if(el) el.innerHTML = '';return;}
  const tiers = [];
  for(let i=0;i<players.length;i+=teams.length) tiers.push(players.slice(i, i + teams.length));
  el.innerHTML = tiers.map((tier, tierIdx)=>`
    <div class="num-tier">
      <div class="num-tier-title">第 ${tierIdx+1} 層實力 <span class="tier-hint">此層會隨機分到各隊</span></div>
      ${tier.map((p, offset)=>{
        const playerIdx = tierIdx * teams.length + offset;
        return `<div class="num-row" data-strength-index="${playerIdx}" draggable="true" ondragstart="startStrengthDrag(event,${playerIdx})" ondragover="overStrengthDrag(event)" ondragleave="leaveStrengthDrag(event)" ondrop="dropStrength(event,${playerIdx})" ondragend="endStrengthDrag(event)" onpointerdown="startStrengthPointer(event,${playerIdx})" onpointermove="moveStrengthPointer(event)" onpointerup="endStrengthPointer(event)" onpointercancel="endStrengthPointer(event)">
          <span class="strength-rank">${playerIdx+1}</span>
          <span class="drag-handle">≡</span>
          <span class="badge ${p.gender==='f'?'badge-f':'badge-m'}">${p.gender==='f'?'女':'男'}</span>
          <span style="flex:1;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHTML(p.name)}</span>
        </div>`;
      }).join('')}
    </div>`).join('');
}
 
function shuffle(a){
  const b = [...a];
  for(let i=b.length-1;i>0;i--){
    const j = Math.floor(Math.random() * (i + 1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}
 
function genderCount(team, gender){
  return team.members.filter(p=>p.gender === gender).length;
}
 
function groupGenderScore(team, group){
  const afterSize = team.members.length + group.length;
  const femaleAdd = group.filter(p=>p.gender === 'f').length;
  const maleAdd = group.length - femaleAdd;
  return afterSize * 10 + Math.abs((genderCount(team,'f') + femaleAdd) - (genderCount(team,'m') + maleAdd));
}
 
function pickBestTeam(result, group){
  return result.reduce((best, team)=>{
    const score = groupGenderScore(team, group);
    const bestScore = groupGenderScore(best, group);
    if(score < bestScore) return team;
    if(score === bestScore && Math.random() > .5) return team;
    return best;
  }, result[0]);
}

function validateStrengthBindRules(){
  const bad = bindGroups.find(g=>g.length >= 2 && hasSameTierInGroup(g));
  if(!bad) return null;
  const names = bad.map(id=>players.find(p=>p.id===id)?.name).filter(Boolean).join('、');
  return `同一實力層的球員不能綁定：${names}`;
}

function buildStrengthTiers(){
  const tiers = [];
  for(let i=0;i<players.length;i+=teams.length){
    tiers.push(players.slice(i, i + teams.length));
  }
  return tiers;
}

function assignBindGroupsForStrength(validBinds){
  const ordered = [...validBinds].sort((a,b)=>b.length-a.length);
  const usedByTier = new Map();
  const assignments = new Map();

  function canUseTeam(group, teamIdx){
    return group.every(p=>{
      const tier = getStrengthTierIndex(p.id);
      const usedTeams = usedByTier.get(tier);
      return !usedTeams || !usedTeams.has(teamIdx);
    });
  }

  function markGroup(group, teamIdx){
    group.forEach(p=>{
      const tier = getStrengthTierIndex(p.id);
      if(!usedByTier.has(tier)) usedByTier.set(tier, new Set());
      usedByTier.get(tier).add(teamIdx);
      assignments.set(p.id, teamIdx);
    });
  }

  function unmarkGroup(group, teamIdx){
    group.forEach(p=>{
      const tier = getStrengthTierIndex(p.id);
      usedByTier.get(tier)?.delete(teamIdx);
      assignments.delete(p.id);
    });
  }

  function backtrack(index){
    if(index >= ordered.length) return true;
    const group = ordered[index];
    for(const teamIdx of shuffle(teams.map((_,i)=>i))){
      if(!canUseTeam(group, teamIdx)) continue;
      markGroup(group, teamIdx);
      if(backtrack(index + 1)) return true;
      unmarkGroup(group, teamIdx);
    }
    return false;
  }

  if(!backtrack(0)) return null;
  return assignments;
}
 
function doGroup(){
  if(players.length === 0){alert('請先到報名頁新增球員！');return;}
  if(players.length < teams.length){alert('球員人數不能少於隊伍數！');return;}
  if(mode === 'number' && players.length % teams.length !== 0 && !confirm(`目前 ${players.length} 人無法平均切成每層 ${teams.length} 人，最後一層會少人，仍要分組嗎？`)) return;
  let result = teams.map(t=>({...t,members:[]}));
  if(mode === 'random'){
    let rem = [...players];
    const bound = bindGroups.filter(g=>g.length>=2).map(grp=>grp.map(id=>players.find(p=>p.id===id)).filter(Boolean));
    shuffle(bound).sort((a,b)=>b.length-a.length).forEach(group=>{
      const target = pickBestTeam(result, group);
      group.forEach(p=>{
        target.members.push(p);
        rem = rem.filter(x=>x.id!==p.id);
      });
    });
    const females = shuffle(rem.filter(p=>p.gender === 'f'));
    const males = shuffle(rem.filter(p=>p.gender !== 'f'));
    [...females, ...males].forEach(p=>pickBestTeam(result, [p]).members.push(p));
  }else{
    const ruleError = validateStrengthBindRules();
    if(ruleError){ alert(ruleError); return; }

    // 實力分組：綁定組先指定同隊；每層剩餘玩家只能進入該層尚未使用的隊
    const tiers = buildStrengthTiers();
    const validBinds = bindGroups.filter(g=>g.length>=2)
      .map(grp=>grp.map(id=>players.find(p=>p.id===id)).filter(Boolean));
    const bindAssignments = assignBindGroupsForStrength(validBinds);
    if(!bindAssignments){
      alert('目前綁定設定與實力層規則衝突，請調整綁定或實力排序');
      return;
    }
 
    let assignmentConflict = false;
    tiers.forEach(tierPlayers=>{
      if(assignmentConflict) return;
      const usedTeams = new Set();
      tierPlayers.forEach(p=>{
        const teamIdx = bindAssignments.get(p.id);
        if(teamIdx === undefined) return;
        result[teamIdx].members.push(p);
        usedTeams.add(teamIdx);
      });

      const freeTeams = shuffle(teams.map((_,i)=>i).filter(i=>!usedTeams.has(i)));
      shuffle(tierPlayers.filter(p=>!bindAssignments.has(p.id))).forEach(p=>{
        const teamIdx = freeTeams.shift();
        if(teamIdx === undefined){
          assignmentConflict = true;
          return;
        }
        result[teamIdx].members.push(p);
        usedTeams.add(teamIdx);
      });
    });
    if(assignmentConflict){
      alert('實力層分配失敗，請檢查綁定設定');
      return;
    }
    renderNumPreview();
  }
  renderResult(result);
  document.getElementById('result-card').style.display = 'block';
  setTimeout(()=>document.getElementById('result-card').scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  // 儲存分組結果
  state.rosters[selectedDate] = {
    ...(state.rosters[selectedDate] || {}),
    players,
    bindGroups,
    nextId,
    teams: teams.map(t=>({...t})),
    groupResult: normalizeGroupResult(result)
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  queueCloudSave();
}
 
function renderResult(result){
  const el = document.getElementById('result-area');
  el.innerHTML = result.map((t,i)=>`
    <div class="result-team tc${i%6}">
      <div class="result-team-head">
        <span class="result-team-name tnc${i%6}">${escapeHTML(t.name)}</span>
        <span class="result-team-count">${t.members.length}人 男${t.members.filter(p=>p.gender!=='f').length} 女${t.members.filter(p=>p.gender==='f').length}</span>
      </div>
      <div class="result-players">
        ${t.members.map(p=>`<span class="rp ${p.gender==='f'?'f':'m'}">${escapeHTML(p.name)}</span>`).join('')}
      </div>
    </div>`).join('');
}

function normalizeGroupResult(result){
  return result.map(t=>({
    name:t.name,
    members:(t.members || []).map(p=>({id:p.id,name:p.name,gender:p.gender}))
  }));
}

function renderSavedGroupResult(){
  const roster = state.rosters[selectedDate] || {};
  const result = roster.groupResult;
  const card = document.getElementById('result-card');
  if(!card) return;
  if(!Array.isArray(result) || result.length === 0){
    card.style.display = 'none';
    return;
  }
  renderResult(result);
  card.style.display = 'block';
}

function formatTime(iso){
  if(!iso) return '';
  try{
    return new Intl.DateTimeFormat('zh-TW', {
      month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit',
      hour12:false, timeZone:'Asia/Taipei'
    }).format(new Date(iso));
  }catch(_){
    return iso;
  }
}

function confirmGroupResult(){
  const roster = state.rosters[selectedDate] || {};
  if(!Array.isArray(roster.groupResult) || roster.groupResult.length === 0){
    alert('請先分組再確認');
    return;
  }
  const record = {
    id: `${Date.now()}`,
    confirmedAt: new Date().toISOString(),
    teams: teams.map(t=>({...t})),
    result: roster.groupResult
  };
  const confirmed = Array.isArray(roster.confirmedGroups) ? roster.confirmedGroups : [];
  state.rosters[selectedDate] = {
    ...roster,
    confirmedGroups: [record, ...confirmed].slice(0, 20)
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  queueCloudSave();
  renderConfirmedGroups();
  alert('✅ 已確定分組並同步紀錄');
}

function renderConfirmedGroups(){
  const card = document.getElementById('confirmed-card');
  const el = document.getElementById('confirmed-area');
  if(!card || !el) return;
  const records = (state.rosters[selectedDate] || {}).confirmedGroups || [];
  if(!records.length){
    card.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  card.style.display = 'block';
  el.innerHTML = records.map((record, idx)=>`
    <div class="result-team tc${idx%6}">
      <div class="result-team-head">
        <span class="result-team-name tnc${idx%6}">第 ${records.length - idx} 次確定</span>
        <span class="result-team-count">${formatTime(record.confirmedAt)}</span>
        <button class="roster-del" style="margin-left:auto" title="刪除此紀錄" onclick="deleteConfirmedGroup('${record.id}')">×</button>
      </div>
      ${(record.result || []).map((t,i)=>`
        <div style="margin-top:8px">
          <div class="result-team-head" style="margin-bottom:5px">
            <span class="result-team-name tnc${i%6}" style="font-size:13px">${escapeHTML(t.name)}</span>
            <span class="result-team-count">${(t.members || []).length}人</span>
          </div>
          <div class="result-players">
            ${(t.members || []).map(p=>`<span class="rp ${p.gender==='f'?'f':'m'}">${escapeHTML(p.name)}</span>`).join('')}
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function deleteConfirmedGroup(id){
  if(!confirm('確定刪除此筆確定分組紀錄？')) return;
  const roster = state.rosters[selectedDate] || {};
  const records = Array.isArray(roster.confirmedGroups) ? roster.confirmedGroups : [];
  state.rosters[selectedDate] = {
    ...roster,
    confirmedGroups: records.filter(record=>record.id !== id)
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  queueCloudSave();
  renderConfirmedGroups();
}
 
function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id === 'group'){
    // Re-sync from cloud before rendering group page
    loadRosterFromCloud(selectedDate).then(updated => {
      if(updated) loadRosterForDate(selectedDate);
      renderTeams();
      renderGroupRoster();
      renderSavedGroupResult();
      renderConfirmedGroups();
    });
  }
  if(id === 'payment'){
    // Re-sync from cloud before rendering payment page
    loadRosterFromCloud(selectedDate).then(updated => {
      if(updated) loadRosterForDate(selectedDate);
      renderPayDates();
      renderPayList();
    });
  }
}
 
function goToGroup(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-group').classList.add('active');
  document.querySelectorAll('.tab-btn')[1].classList.add('active');
  renderTeams();
  renderGroupRoster();
  renderSavedGroupResult();
  renderConfirmedGroups();
}
 
function renderAll(){
  renderDates();
  renderPresets();
  renderRoster();
  renderGroupRoster();
  renderSavedGroupResult();
  renderConfirmedGroups();
  updateStats();
  if(document.getElementById('page-payment').classList.contains('active')){
    renderPayDates();
    renderPayList();
  }
}
 
async function init(){
  renderDates();
  loadRosterForDate(selectedDate);
  if(await loadRosterFromCloud(selectedDate)) loadRosterForDate(selectedDate);
  renderAll();
  const feeEl = document.getElementById('pay-fee');
  if(feeEl) feeEl.value = state.payFee || 150;
}
 
// ── 收錢功能 ──────────────────────────────────────────
// payments: { [dateKey]: { [playerName]: true/false } }
function getPayments(dateKey){
  return (state.payments && state.payments[dateKey]) || {};
}
function savePayments(dateKey, payments){
  if(!state.payments) state.payments = {};
  state.payments[dateKey] = payments;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  queueCloudSave();
}
 
function togglePay(name){
  const pm = {...getPayments(selectedDate)};
  pm[name] = !pm[name];
  savePayments(selectedDate, pm);
  renderPayList();
}
function payAll(){
  const pm = {};
  players.forEach(p => pm[p.name] = true);
  savePayments(selectedDate, pm);
  renderPayList();
}
function payNone(){
  savePayments(selectedDate, {});
  renderPayList();
}
function savePayFee(){
  state.payFee = Number(document.getElementById('pay-fee').value) || 0;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  renderPayList();
}
 
function renderPayDates(){
  const dates = getNextSaturdays(8);
  const el = document.getElementById('pay-date-scroll');
  if(!el) return;
  el.innerHTML = dates.map(d=>{
    const key = fmt(d);
    const {month,day,weekday} = fmtLabel(d);
    return `<button class="date-chip${key===selectedDate?' active':''}" onclick="paySelectDate('${key}')">
      <div class="month">${month}</div>
      <div class="day">${day}</div>
      <div class="weekday">${weekday}</div>
    </button>`;
  }).join('');
}
 
async function paySelectDate(key){
  saveState({cloud:false});
  selectedDate = key;
  loadRosterForDate(selectedDate);
  if(await loadRosterFromCloud(selectedDate)) loadRosterForDate(selectedDate);
  renderDates();
  renderPayDates();
  renderPayList();
  updateStats();
}
 
function renderPayList(){
  const fee = Number((document.getElementById('pay-fee') || {}).value || state.payFee || 150);
  const el = document.getElementById('pay-list');
  if(!el) return;
  if(players.length === 0){
    el.innerHTML = '<div class="empty-hint">請先到報名頁新增球員</div>';
    document.getElementById('pay-total').textContent = 0;
    document.getElementById('pay-paid').textContent = 0;
    document.getElementById('pay-unpaid').textContent = 0;
    document.getElementById('pay-sum').textContent = 0;
    return;
  }
  const pm = getPayments(selectedDate);
  const paidCount = players.filter(p => pm[p.name]).length;
  document.getElementById('pay-total').textContent = players.length;
  document.getElementById('pay-paid').textContent = paidCount;
  document.getElementById('pay-unpaid').textContent = players.length - paidCount;
  document.getElementById('pay-sum').textContent = (paidCount * fee).toLocaleString();
  // show unpaid first
  const sorted = [...players].sort((a,b) => (pm[a.name]?1:0)-(pm[b.name]?1:0));
  el.innerHTML = sorted.map(p => {
    const paid = !!pm[p.name];
    return `<div class="pay-item${paid?' paid':''}">
      <button class="pay-toggle" onclick="togglePay('${escapeHTML(p.name)}')">${paid?'✓':''}</button>
      <span class="badge ${p.gender==='f'?'badge-f':'badge-m'}">${p.gender==='f'?'女':'男'}</span>
      <span class="pay-name">${escapeHTML(p.name)}</span>
      <span class="pay-status">${paid?'已收錢':'未收錢'}</span>
    </div>`;
  }).join('');
  // restore fee input
  const feeEl = document.getElementById('pay-fee');
  if(feeEl && !feeEl.dataset.focused) feeEl.value = state.payFee || 150;
}
 
init();
</script>
